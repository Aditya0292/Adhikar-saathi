# ─────────────────────────────────────────────────────────
# Adhikar साथी — Local Development Docker Compose
# Services: PostgreSQL 16 + pgvector, Redis 7
# Run: docker compose up -d
# ─────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── PostgreSQL 16 with pgvector extension ───────────────
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: adhikarsathi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: adhikarsathi
      POSTGRES_PASSWORD: adhikarsathi_dev_pass
      POSTGRES_DB: adhikarsathi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adhikarsathi -d adhikarsathi_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - adhikarsathi_net

  # ── Redis 7 (rate limiting + caching) ───────────────────
  redis:
    image: redis:7-alpine
    container_name: adhikarsathi_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - adhikarsathi_net

# ── Named Volumes ────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ── Network ──────────────────────────────────────────────
networks:
  adhikarsathi_net:
    driver: bridge
